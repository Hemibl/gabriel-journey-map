// ============ MAP SETUP ============

L.control.zoom({ position: 'topright' }).addTo(map);

// Esri tiles (work from local files, English labels)

// ============ COLORS ============

events.forEach((event, idx) => {

// ============ DISTANCE LABELS LAYER ============
const distanceLayerGroup = L.layerGroup().addTo(map);

// ============ DISTANCE HELPER ============
function haverDist(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function midpoint(lat1, lng1, lat2, lng2) {
  return [(lat1+lat2)/2, (lng1+lng2)/2];
}

function distLabel(km, extra) {
  return `<div style="
    background:rgba(26,26,46,0.92);color:#f0e68c;padding:4px 10px;border-radius:20px;
    font-family:'David Libre',serif;font-size:13px;font-weight:700;white-space:nowrap;
    border:1px solid rgba(240,230,140,0.4);direction:rtl;pointer-events:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
  ">✈ ${km} ק"מ${extra ? ' · ' + extra : ''}</div>`;
}

// ============ ROUTE LINES + DISTANCE LABELS ============

// Zhetl internal events (1-6) - within town, no distance label
const zhetlCoords = events.slice(0,6).map(e => [e.lat, e.lng]);
L.polyline(zhetlCoords, { color: '#e74c3c', weight: 2.5, opacity: 0.5, dashArray: '4,6' }).addTo(map);

// Kuna → Novogrudok (6 → 7): transport by trucks

const m67 = midpoint(53.4560,25.3980, 53.5942,25.8194);
L.polyline([[53.4560,25.3980],[53.5942,25.8194]], { color: '#95a5a6', weight: 3, opacity: 0.65, dashArray: '10,6' }).addTo(map);
L.marker(m67, { icon: L.divIcon({ className:'x', html: distLabel(d67,'במשאיות'), iconSize:null, iconAnchor:[55,10] }), interactive:false }).addTo(distanceLayerGroup);

// Novogrudok → Dvorets escape (7 → 9): on foot, two nights
const d79 = haverDist(53.5942,25.8194, 53.4069,25.5706);
const m79 = midpoint(53.5942,25.8194, 53.4069,25.5706);
L.polyline([[53.5942,25.8194],[53.5100,25.6800],[53.4069,25.5706]], { color: '#2ecc71', weight: 3, opacity: 0.7, dashArray: '6,8' }).addTo(map);
L.marker(m79, { icon: L.divIcon({ className:'x', html: distLabel(d79,'רגלית - שני לילות'), iconSize:null, iconAnchor:[80,10] }), interactive:false }).addTo(distanceLayerGroup);

// Zhetl → Dvorets (reference distance from diary)
const dZD = haverDist(53.4614,25.4072, 53.4069,25.5706);
// (mentioned in diary as ~12 km - shown in Dvorets card)

// Dvorets internal (9 → 10)
L.polyline([[53.4069,25.5706],[53.4075,25.5720]], { color: '#e74c3c', weight: 2, opacity: 0.5 }).addTo(map);

// Dvorets → wandering (10 → 11)
const d1011 = haverDist(53.4075,25.5720, 53.4300,25.4900);
const m1011 = midpoint(53.4075,25.5720, 53.4300,25.4900);
L.polyline([[53.4075,25.5720],[53.4300,25.4900]], { color: '#3498db', weight: 2.5, opacity: 0.6, dashArray: '4,4' }).addTo(map);
L.marker(m1011, { icon: L.divIcon({ className:'x', html: distLabel(d1011,'רגלית בלילות'), iconSize:null, iconAnchor:[65,10] }), interactive:false }).addTo(distanceLayerGroup);

// Wandering → robbery village (11 → 12)
const d1112 = haverDist(53.4300,25.4900, 53.4150,25.5500);
const m1112 = midpoint(53.4300,25.4900, 53.4150,25.5500);
L.polyline([[53.4300,25.4900],[53.4150,25.5500]], { color: '#3498db', weight: 2.5, opacity: 0.6, dashArray: '4,4' }).addTo(map);
L.marker(m1112, { icon: L.divIcon({ className:'x', html: distLabel(d1112), iconSize:null, iconAnchor:[35,10] }), interactive:false }).addTo(distanceLayerGroup);

// Robbery village → partisans forest (12 → 13): by cart
const d1213 = haverDist(53.4150,25.5500, 53.4000,25.1500);
const m1213 = midpoint(53.4150,25.5500, 53.4000,25.1500);
L.polyline([[53.4150,25.5500],[53.4000,25.1500]], { color: '#9b59b6', weight: 3, opacity: 0.7, dashArray: '8,5' }).addTo(map);
L.marker(m1213, { icon: L.divIcon({ className:'x', html: distLabel(d1213,'בעגלה עם הפרטיזנים'), iconSize:null, iconAnchor:[80,10] }), interactive:false }).addTo(distanceLayerGroup);

// ============ CONTEXT CITIES ============
contextCities.forEach(city => {
  const icon = L.divIcon({

// ============ HEBREW PLACE LABELS ON MAP ============
const labels = [
  { name: 'זטיל (Dyatlovo)', lat: 53.4660, lng: 25.4072, size: '14px' },

// ============ LEGEND ============
const legend = L.control({ position: 'topleft' });
legend.onAdd = function() {
  const d = L.DomUtil.create('div');
  d.style.cssText = 'background:rgba(30,30,46,0.97);padding:12px 18px;border-radius:12px;border:1px solid #555;direction:rtl;font-family:David Libre,serif;min-width:160px;';
  const items = [
    ['#e67e22','גטו / כיבוש'], ['#e74c3c','טבח / שחיטה'], ['#2ecc71','בריחה'],

};
legend.addTo(map);

// ============ DISTANCE SCALE ============

// ============ DISTANCE TOGGLE BUTTON ============
const distToggle = L.control({ position: 'topright' });
distToggle.onAdd = function() {
  const btn = L.DomUtil.create('button');
  btn.innerHTML = '👣 מרחקים';
  btn.title = 'הצג/הסתר תוויות מרחק';
  btn.style.cssText = `
    display:block; padding:6px 14px; cursor:pointer;
    background:rgba(30,30,46,0.95); color:#f0e68c;
    border:1px solid rgba(240,230,140,0.4); border-radius:8px;
    font-family:'David Libre',serif; font-size:14px; font-weight:700;
    box-shadow:0 2px 6px rgba(0,0,0,0.4); direction:rtl;
    transition: background 0.2s;
  `;
  let visible = true;
  L.DomEvent.on(btn, 'click', () => {
    visible = !visible;
    if (visible) {
      distanceLayerGroup.addTo(map);
      btn.style.background = 'rgba(30,30,46,0.95)';
      btn.style.color = '#f0e68c';
      btn.style.borderColor = 'rgba(240,230,140,0.4)';
    } else {
      distanceLayerGroup.remove();
      btn.style.background = 'rgba(30,30,46,0.6)';
      btn.style.color = '#666';
      btn.style.borderColor = '#444';
    }
    L.DomEvent.stopPropagation(btn);
  });
  return btn;
};
distToggle.addTo(map);

// ============ SIDEBAR TIMELINE ============
const timelineEl = document.getElementById('timeline');
events.forEach((event, idx) => {
  const card = document.createElement('div');
  card.className = 'event-card';
  card.dataset.id = event.id;
  card.dataset.period = event.period;
  const color = typeColors[event.type];

  // Distance from previous significant location (skip internal Zhetl events)
  let distBadge = '';
  if (idx > 0) {
    const prev = events[idx - 1];
    const km = haverDist(prev.lat, prev.lng, event.lat, event.lng);
    if (km >= 2) {
      distBadge = `<span style="
        display:inline-block;background:rgba(240,230,140,0.15);color:#f0e68c;
        border:1px solid rgba(240,230,140,0.35);border-radius:12px;
        font-size:0.78em;padding:2px 10px;margin-right:6px;font-weight:700;
      ">✈ ${km} ק"מ</span>`;
    }
  }

  card.innerHTML = `
    <div class="date"><span class="step-num" style="background:${color}">${idx+1}</span> ${event.date} ${distBadge}</div>
    <div class="location-name">${event.hebrewName}</div>
    <div class="description">${event.description}</div>
    ${event.quote ? `<div class="card-quote">${event.quote}</div>` : ''}
    <span class="event-type type-${event.type}">${event.typeLabel}</span>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    // שיפור 1: גלילה אוטומטית לכרטיס הפעיל
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    map.flyTo([event.lat, event.lng], event.id <= 6 ? 14 : 12, { duration: 1.2 });
    markers[event.id].openPopup();
  });
  timelineEl.appendChild(card);
});

// ============ PERIOD FILTERS ============
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const p = btn.dataset.period;
    document.querySelectorAll('.event-card').forEach(c => {
      c.style.display = (p === 'all' || c.dataset.period === p) ? 'block' : 'none';
    });
    if (p !== 'all') {
      const pe = events.filter(e => e.period == p);
      map.flyToBounds(L.latLngBounds(pe.map(e => [e.lat, e.lng])).pad(0.5), { duration: 1.2 });
    } else {
      map.flyToBounds(L.latLngBounds(allCoords).pad(0.15), { duration: 1.2 });
    }
  });
});
</script>
